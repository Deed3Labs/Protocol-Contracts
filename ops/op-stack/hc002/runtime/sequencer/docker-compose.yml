name: clear-testnet

services:
  op-geth:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:latest
    volumes:
      - .:/workspace
    working_dir: /workspace
    restart: unless-stopped
    ports:
      - "9545:8545"
      - "9546:8546"
      - "9551:8551"
    command:
      - "--datadir=/workspace/op-geth-data"
      - "--http"
      - "--http.addr=0.0.0.0"
      - "--http.port=8545"
      - "--ws"
      - "--ws.addr=0.0.0.0"
      - "--ws.port=8546"
      - "--authrpc.addr=0.0.0.0"
      - "--authrpc.port=8551"
      - "--authrpc.jwtsecret=/workspace/jwt.txt"
      - "--syncmode=full"
      - "--gcmode=archive"
      - "--rollup.disabletxpoolgossip=true"
      - "--http.vhosts=*"
      - "--http.corsdomain=*"
      - "--http.api=eth,net,web3,debug,txpool,admin"
      - "--ws.origins=*"
      - "--ws.api=eth,net,web3,debug,txpool,admin"
      - "--authrpc.vhosts=*"

  op-node:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node:latest
    depends_on:
      - op-geth
    volumes:
      - .:/workspace
    working_dir: /workspace
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "9547:8547"
      - "9222:9222"
    command:
      - op-node
      - --l1=${L1_RPC_URL}
      - --l1.beacon=${L1_BEACON_URL}
      - --l2=http://op-geth:8551
      - --l2.jwt-secret=/workspace/jwt.txt
      - --rollup.config=/workspace/rollup.json
      - --sequencer.enabled=true
      - --sequencer.stopped=false
      - --sequencer.max-safe-lag=3600
      - --verifier.l1-confs=4
      - --p2p.listen.ip=0.0.0.0
      - --p2p.listen.tcp=9222
      - --p2p.listen.udp=9222
      - --p2p.advertise.ip=${P2P_ADVERTISE_IP}
      - --p2p.advertise.tcp=9222
      - --p2p.advertise.udp=9222
      - --p2p.sequencer.key=${PRIVATE_KEY}
      - --rpc.addr=0.0.0.0
      - --rpc.port=8547
      - --rpc.enable-admin
      - --log.level=info
      - --log.format=json

  op-batcher:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-batcher:v1.13.2
    depends_on:
      - op-node
    volumes:
      - .:/workspace
    working_dir: /workspace
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "9548:8548"
    command: >
      op-batcher
      --rpc.addr=0.0.0.0
      --rpc.enable-admin
      --resubmission-timeout=30s
      --log.level=info
      --log.format=json

  op-proposer:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-proposer:v1.10.0
    depends_on:
      - op-node
    volumes:
      - .:/workspace
    working_dir: /workspace
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "9560:8560"
    command: >
      op-proposer
      --rpc.port=8560
      --log.level=info
      --log.format=json
